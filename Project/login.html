<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Glam Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Questrial&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../CSS/login.css">
</head>

<body>

<div class="login-container">

    <!-- Left Side -->

    <div class="left-panel">

        <img src="../Images/login_image.png" alt="Bride">

        <div class="overlay-card">

            <h3>Enhancing Beauty</h3>

            <h2>Creating Confidence</h2>

            <p>
                Premium bridal makeup artists
                for your special day.
            </p>

            <div class="features">

                <div>
                    ✔
                    <span>Verified Artists</span>
                </div>

                <div>
                    ♥
                    <span>Trusted by Brides</span>
                </div>

                <div>
                    ✦
                    <span>Premium Services</span>
                </div>

            </div>

        </div>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <p class="logo-small">BLUSHBOOK</p>

        <h1 class="logo">
            Glam Bar
        </h1>

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Login to continue your account
        </p>

        <form>

            <div class="input-group">
                <input
                    type="email"
                    placeholder="Email Address"
                    required
                >
            </div>

            <div class="input-group">
                <input
                    type="password"
                    placeholder="Password"
                    required
                >
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button class="login-btn">
                Login
            </button>

        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">

            <button>
                Google
            </button>

            <button>
                Apple
            </button>

        </div>

        <p class="signup-link">
            Don't have an account?
            <a href="signup-choice.html">
    Sign Up
</a>
        </p>
    </div>

</div>

</body>
</html>
