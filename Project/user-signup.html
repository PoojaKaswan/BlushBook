<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Signup - Glam Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Questrial&display=swap" rel="stylesheet">
<style>
    :root{
    --primary:#e91e63;
    --bg:#fff8fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:var(--bg);
    font-family:'Poppins',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.signup-container{
    width:1200px;
    max-width:100%;
    height: 92vh;
    background:white;

    border-radius:30px;

    overflow:hidden;

    display:grid;
    grid-template-columns:1fr 1fr;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);
}

.left-panel{
    position:relative;
}

.left-panel img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;

    bottom:40px;
    left:100px;

    background:
    rgba(255,255,255,.9);

    padding:25px;

    border-radius:20px;

    width:400px;
}

.overlay h2{
    color:var(--primary);
}

.overlay p{
    margin-top:10px;
    color:#555;
}

.right-panel{
    padding:0px;
}

.logo-small{
    text-align:center;
    color:var(--primary);
    letter-spacing:2px;
    font-weight: 700;
    margin-top: 2rem;
}

.logo{
    text-align:center;
    color:var(--primary);
    font-size:4rem;
    margin-top: 7px;
    margin-bottom:7px;
    font-family: "Great Vibes", cursive;
}

.right-panel h2{
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#777;
    margin:10px 0 30px;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input{
    padding:11px;
    border:1px solid #eee;
    border-radius:12px;
}

.terms{
    font-size:14px;
    color:#555;
}

button{
    border:none;
    background:#e91e63;
    color:white;

    padding:11px;

    border-radius:40px;

    font-size:16px;
    cursor:pointer;
}

.login-link{
    text-align:center;
    margin-top:9px;
}

.login-link a{
    color:#e91e63;
    text-decoration:none;
}

@media(max-width:900px){

.signup-container{
    grid-template-columns:1fr;
}

.left-panel{
    display:none;
}

.right-panel{
    padding:30px;
}

.logo{
    font-size:3rem;
}

}
</style>
</head>

<body>

<div class="signup-container">

    <div class="left-panel">

        <img src="../Images/login_image.png" alt="Bride">

        <div class="overlay">
            <h2>Your Dream Look Starts Here</h2>
            <p>
                Discover talented bridal artists,
                compare portfolios and book with confidence.
            </p>
        </div>

    </div>

    <div class="right-panel">

        <p class="logo-small">BLUSHBOOK</p>

        <h1 class="logo">Glam Bar</h1>

        <h2>Create Your Account</h2>

        <p class="subtitle">
            Join thousands of brides finding their perfect artist.
        </p>

        <form>

            <input type="text"
            placeholder="Full Name"
            required>

            <input type="email"
            placeholder="Email Address"
            required>

            <input type="tel"
            placeholder="Phone Number"
            required>

            <input type="date">

            <input type="text"
            placeholder="City">

            <input type="password"
            placeholder="Password"
            required>

            <input type="password"
            placeholder="Confirm Password"
            required>

            <label class="terms">

                <input type="checkbox">

                I agree to the
                Terms & Conditions

            </label>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

</body>
</html>
