<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Glam Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Questrial&display=swap" rel="stylesheet">
<style>

:root{
    --primary:#e91e63;
    --secondary:#ff4d8d;
    --bg:#fff8fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:var(--bg);
    font-family:'Poppins',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.signup-selection{
    width:100%;
    max-width:1000px;
    text-align:center;
}

.logo-small{
    color:var(--primary);
    letter-spacing:3px;
    font-weight:600;
}

.logo{
    font-family: "Great Vibes", cursive;
    font-size:5rem;
    color:var(--primary);
    margin-top:5px;
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-top:10px;
    margin-bottom:50px;
}

.role-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.role-card{
    width:340px;

    background:white;

    padding:40px;

    border-radius:24px;

    text-decoration:none;

    color:#333;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);

    transition:.3s;
}

.role-card:hover{
    transform:translateY(-8px);

    border:2px solid var(--primary);
}

.role-icon{
    font-size:4rem;
    margin-bottom:20px;
}

.role-card h3{
    color:var(--primary);
    margin-bottom:15px;
    font-size:1.8rem;
}

.role-card p{
    line-height:1.7;
    color:#666;
}

.back-link{
    display:inline-block;
    margin-top:50px;
    color:var(--primary);
    text-decoration:none;
    font-weight:600;
}

@media(max-width:768px){

.logo{
    font-size:3rem;
}

.role-card{
    width:100%;
}

}

</style>
</head>

<body>

<div class="signup-selection">

    <p class="logo-small">BLUSHBOOK</p>

    <h1 class="logo">Glam Bar</h1>

    <h2>Join Glam Bar</h2>

    <p class="subtitle">
        Choose how you'd like to continue
    </p>

    <div class="role-container">

        <a href="user-signup.html" class="role-card">

            <div class="role-icon">👰</div>

            <h3>User</h3>

            <p>
                Find talented bridal artists,
                compare portfolios,
                read reviews and book appointments.
            </p>

        </a>

        <a href="artist-signup.html" class="role-card">

            <div class="role-icon">💄</div>

            <h3>Artist</h3>

            <p>
                Showcase your work,
                receive bookings,
                manage clients and grow your business.
            </p>

        </a>

    </div>

    <a href="login.html" class="back-link">
        ← Back to Login
    </a>

</div>

</body>
</html>
