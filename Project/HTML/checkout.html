<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Glam Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    :root{
    --primary:#e91e63;
    --secondary:#ff4d8d;
    --bg:#fff8fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
}

.checkout-container{
    max-width:1400px;
    margin:auto;
    padding:40px;

    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

.artist-card,
.form-card,
.summary-card{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.artist-card{
    display:flex;
    gap:25px;
    margin-bottom:25px;
}

.artist-card img{
    width:280px;
    height:220px;
    object-fit:cover;
    border-radius:18px;
}

.artist-info h1{
    font-family:'Playfair Display',serif;
    margin-bottom:10px;
}

.artist-info p{
    margin-bottom:10px;
}

.artist-price{
    color:var(--primary);
    font-size:1.5rem;
    font-weight:bold;
}

.form-card h2{
    margin-bottom:20px;
}

form{
    display:flex;
    flex-direction:column;
    gap:14px;
}

label{
    font-weight:500;
}

input,
select,
textarea{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:none;
}

.summary-card{
    height:fit-content;
    position:sticky;
    top:20px;
}

.summary-card h2{
    margin-bottom:25px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
}

.total{
    font-size:1.3rem;
    color:var(--primary);
}

hr{
    border:none;
    border-top:1px solid #eee;
    margin:20px 0;
}

.payment-btn{
    width:100%;
    border:none;

    background:linear-gradient(
    90deg,
    var(--secondary),
    var(--primary)
    );

    color:white;

    padding:16px;

    border-radius:40px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;
}

.payment-btn:hover{
    opacity:.9;
}

@media(max-width:900px){

.checkout-container{
    grid-template-columns:1fr;
}

.artist-card{
    flex-direction:column;
}

.artist-card img{
    width:100%;
}

}
</style>
</head>

<body>

<div class="checkout-container">

    <!-- LEFT SIDE -->

    <div class="booking-section">

        <div class="artist-card">

            <img src="../services images/1.jpeg" alt="Artist">

            <div class="artist-info">

                <h1>Roshni Singh</h1>

                <p>⭐ 4.9 Rating</p>

                <p>Bridal Makeup Artist</p>

                <p class="artist-price">
                    ₹10,000 - ₹15,000
                </p>

            </div>

        </div>

        <div class="form-card">

            <h2>Booking Details</h2>

            <form>

                <label>Service</label>

                <select>
                    <option>Bridal Makeup</option>
                    <option>Hair Styling</option>
                    <option>Saree Draping</option>
                    <option>Nail Styling</option>
                </select>

                <label>Event Date</label>
                <input type="date">

                <label>Preferred Time</label>
                <input type="time">

                <label>Bride Name</label>
                <input type="text" placeholder="Enter name">

                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone">

                <label>Address</label>
                <textarea placeholder="Enter complete address"></textarea>

                <label>Special Requirements</label>
                <textarea placeholder="Any special requests?"></textarea>

            </form>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="summary-card">

        <h2>Booking Summary</h2>

        <div class="summary-row">
            <span>Artist</span>
            <strong>Roshni Singh</strong>
        </div>

        <div class="summary-row">
            <span>Service</span>
            <strong>Bridal Makeup</strong>
        </div>

        <div class="summary-row">
            <span>Date</span>
            <strong>Selected Date</strong>
        </div>

        <div class="summary-row">
            <span>Time</span>
            <strong>Selected Time</strong>
        </div>

        <hr>

        <div class="summary-row total">
            <span>Total</span>
            <strong>₹15,000</strong>
        </div>

        <button class="payment-btn">
            Continue To Payment →
        </button>

    </div>

</div>

</body>
</html>
