<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Access</title>

  <style>

    body{
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
    }

    .box{
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    button{
      padding: 10px 20px;
      border: none;
      background: blue;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

  </style>

</head>
<body>

  <div class="box">

    <h2>Allow Location Access</h2>

    <p>
      We need your location to find nearby services.
    </p>

    <button onclick="getLocation()">
      Allow GPS
    </button>

    <p id="status"></p>

  </div>

  <script>

    function getLocation(){

      navigator.geolocation.getCurrentPosition(

        function(position){

          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          console.log(lat, lng);

          document.getElementById("status").innerHTML =
            "Location Found";

          // save location temporarily
          localStorage.setItem("lat", lat);
          localStorage.setItem("lng", lng);

          // redirect
          window.location.href = "services.html";
        },

        function(error){

          alert("Location permission denied");

        }

      );

    }

  </script>

</body>
</html>
